<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Good Life — One app. Every part of your life. Wellness, finance, habits, gardening, vocal training, home organization and AI. Free on iOS.">
  <title>Good Life — One app. Every part of your life.</title>
  <meta property="og:type" content="website">
  <meta property="og:title" content="Good Life — One app. Every part of your life.">
  <meta property="og:description" content="Wellness, finance, habits, gardening, vocal training, home organization and AI. Free on iOS.">
  <meta property="og:image" content="assets/icon.png">
  <meta property="og:url" content="https://gl.life">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Good Life — One app. Every part of your life.">
  <meta name="twitter:description" content="Wellness, finance, habits, gardening, vocal training, home organization and AI. Free on iOS.">
  <link rel="canonical" href="https://gl.life">
  <style>
/* ─── RESET + BASE ─────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: #0a0a0a;
  color: #fff;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  font-size: 14px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}
img { display: block; max-width: 100%; }
a { color: inherit; text-decoration: none; }

/* ─── TYPOGRAPHY ────────────────────────────────── */
.label {
  display: inline-block;
  background: #1a1a1a;
  border: 1px solid #444;
  color: #aaa;
  font-size: 9px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 3px 10px;
  border-radius: 4px;
  margin-bottom: 12px;
}
.section-title {
  font-size: 36px;
  font-weight: 800;
  letter-spacing: -1px;
  line-height: 1.1;
  margin-bottom: 10px;
}
.section-sub {
  color: #ccc;
  font-size: 14px;
  margin-bottom: 40px;
}
.gradient-text {
  background: linear-gradient(90deg, #818cf8, #c084fc, #38bdf8);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* ─── LAYOUT ────────────────────────────────────── */
.container {
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 40px;
}
.section { padding: 80px 0; }
.divider { border: none; border-top: 1px solid #1a1a1a; }

/* ─── NAV ───────────────────────────────────────── */
.nav {
  position: sticky;
  top: 0;
  z-index: 100;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 40px;
  background: rgba(10,10,10,0.9);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border-bottom: 1px solid #1a1a1a;
}
.nav-logo { font-size: 16px; font-weight: 800; letter-spacing: -0.5px; }
.nav-links { display: flex; gap: 28px; }
.nav-links a { color: #bbb; font-size: 13px; transition: color .2s; }
.nav-links a:hover { color: #fff; }
.nav-cta {
  background: #fff;
  color: #000;
  border-radius: 20px;
  padding: 8px 18px;
  font-size: 13px;
  font-weight: 600;
  transition: opacity .2s;
}
.nav-cta:hover { opacity: 0.85; }

/* ─── HERO ──────────────────────────────────────── */
.hero {
  display: flex;
  align-items: center;
  gap: 60px;
  padding: 90px 40px 70px;
  max-width: 1100px;
  margin: 0 auto;
  position: relative;
  overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute;
  top: -80px; right: -80px;
  width: 520px; height: 520px;
  background: radial-gradient(circle, rgba(99,102,241,0.13) 0%, transparent 70%);
  pointer-events: none;
}
.hero-text { flex: 1; }
.hero-eyebrow {
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: #aaa;
  margin-bottom: 18px;
}
.hero-headline {
  font-size: 56px;
  font-weight: 900;
  line-height: 1.0;
  letter-spacing: -2px;
  margin-bottom: 18px;
}
.hero-sub {
  font-size: 15px;
  color: #ccc;
  line-height: 1.7;
  margin-bottom: 28px;
  max-width: 480px;
}
.hero-badges {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 32px;
}
.badge {
  background: #111;
  border: 1px solid #333;
  border-radius: 20px;
  padding: 6px 14px;
  font-size: 12px;
  color: #ccc;
}
.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: #fff;
  color: #000;
  border-radius: 12px;
  padding: 14px 26px;
  font-size: 14px;
  font-weight: 700;
  transition: opacity .2s, transform .15s;
}
.btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }

/* ─── PHONE MOCKUP ──────────────────────────────── */
.phone-frame {
  flex-shrink: 0;
  width: 220px;
  height: 440px;
  background: #0d0d0d;
  border-radius: 36px;
  border: 2px solid #2a2a2a;
  overflow: hidden;
  box-shadow:
    0 40px 80px rgba(0,0,0,0.7),
    0 0 0 1px rgba(255,255,255,0.04),
    inset 0 1px 0 rgba(255,255,255,0.06);
  position: relative;
}
.phone-frame img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: top;
}
.phone-frame .placeholder {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #333;
  font-size: 11px;
  text-align: center;
  padding: 20px;
  background: #111;
}

/* ─── BENTO GRID ────────────────────────────────── */
.bento-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}
.bento-card {
  border-radius: 16px;
  padding: 20px;
  min-height: 130px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  position: relative;
  overflow: hidden;
  cursor: default;
  transition: transform .2s, box-shadow .2s;
}
.bento-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}
.bento-card.wide { grid-column: span 2; }
.bento-icon { font-size: 24px; margin-bottom: 10px; }
.bento-name { font-size: 14px; font-weight: 700; margin-bottom: 5px; }
.bento-desc { font-size: 11px; color: rgba(255,255,255,0.75); line-height: 1.5; }
.bento-screenshot {
  position: absolute;
  bottom: -12px; right: -12px;
  width: 80px; height: 100px;
  border-radius: 10px;
  overflow: hidden;
  border: 1px solid rgba(255,255,255,0.08);
  box-shadow: -4px -4px 20px rgba(0,0,0,0.4);
}
.bento-screenshot img { width: 100%; height: 100%; object-fit: cover; object-position: top; }
.bento-screenshot .ph { width: 100%; height: 100%; background: rgba(255,255,255,0.04); }

/* ─── BENTO CARD COLORS ─────────────────────────── */
.c-wellness  { background: linear-gradient(135deg, #052e16, #14532d); }
.c-finance   { background: linear-gradient(135deg, #0c1a4a, #1e3a5f); }
.c-habits    { background: linear-gradient(135deg, #2e1065, #1e1b4b); }
.c-mindful   { background: linear-gradient(135deg, #1a0533, #2d1657); }
.c-ai        { background: linear-gradient(135deg, #0a0a2e, #1e1b4b); border: 1px solid #3730a3; }
.c-tasks     { background: linear-gradient(135deg, #0a1628, #1e3a5f); }
.c-garden    { background: linear-gradient(135deg, #052e16, #0a3622); }
.c-vocal     { background: linear-gradient(135deg, #431407, #7c2d12); }
.c-home      { background: linear-gradient(135deg, #0c1a4a, #1e2a5e); }
.c-news      { background: linear-gradient(135deg, #111, #1a1a1a); }

/* ─── DEEP DIVES ────────────────────────────────── */
.deep-dives { padding: 80px 0; }
.deep-dive {
  display: flex;
  align-items: center;
  gap: 70px;
  padding: 64px 0;
  border-top: 1px solid #1a1a1a;
}
.deep-dive.reverse { flex-direction: row-reverse; }
.deepdive-phone {
  flex-shrink: 0;
  width: 210px;
  height: 420px;
  background: #0d0d0d;
  border-radius: 34px;
  border: 2px solid #2a2a2a;
  overflow: hidden;
  box-shadow: 0 30px 60px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.05);
}
.deepdive-phone img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: top;
}
.deepdive-phone .placeholder {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  color: #333; font-size: 11px; text-align: center; padding: 20px;
  background: #111;
}
.deepdive-text { flex: 1; }
.deepdive-label {
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: #aaa;
  margin-bottom: 14px;
}
.deepdive-title {
  font-size: 36px;
  font-weight: 800;
  letter-spacing: -1px;
  line-height: 1.1;
  margin-bottom: 14px;
}
.deepdive-desc {
  color: #ccc;
  font-size: 14px;
  line-height: 1.75;
  margin-bottom: 24px;
}
.feature-list { list-style: none; display: flex; flex-direction: column; gap: 10px; }
.feature-list li {
  display: flex;
  gap: 10px;
  align-items: flex-start;
  font-size: 13px;
  color: #ccc;
}
.feature-list li::before { content: '→'; color: #818cf8; flex-shrink: 0; margin-top: 1px; }

/* ─── AI SPOTLIGHT ──────────────────────────────── */
.ai-section {
  background: linear-gradient(180deg, #050510 0%, #0a0a0a 100%);
  border-top: 1px solid #1a1a2e;
  border-bottom: 1px solid #1a1a2e;
  padding: 80px 0;
}
.ai-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  margin-top: 48px;
}
.ai-card {
  background: #0d0d1f;
  border: 1px solid #1e1b4b;
  border-radius: 16px;
  padding: 22px;
  transition: border-color .2s, transform .2s;
}
.ai-card:hover { border-color: #3730a3; transform: translateY(-2px); }
.ai-card-icon {
  width: 40px; height: 40px;
  background: linear-gradient(135deg, #4f46e5, #7c3aed);
  border-radius: 10px;
  margin-bottom: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}
.ai-card-title { font-size: 15px; font-weight: 700; margin-bottom: 8px; }
.ai-card-desc { font-size: 12px; color: #ccc; line-height: 1.65; }

/* ─── CTA ───────────────────────────────────────── */
.cta-section {
  padding: 110px 0;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.cta-section::before {
  content: '';
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 700px; height: 400px;
  background: radial-gradient(ellipse, rgba(99,102,241,0.18) 0%, transparent 70%);
  pointer-events: none;
}
.cta-headline {
  font-size: 52px;
  font-weight: 900;
  letter-spacing: -2px;
  margin-bottom: 16px;
  position: relative;
}
.cta-sub {
  color: #ccc;
  font-size: 15px;
  margin-bottom: 36px;
  position: relative;
}
.appstore-btn {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  background: #fff;
  color: #000;
  border-radius: 14px;
  padding: 14px 28px;
  font-weight: 700;
  font-size: 15px;
  transition: opacity .2s, transform .15s;
  position: relative;
}
.appstore-btn:hover { opacity: 0.9; transform: translateY(-2px); }
.appstore-btn .store-label { font-size: 9px; font-weight: 400; opacity: 0.6; display: block; }
.appstore-btn .store-name { font-size: 16px; font-weight: 800; display: block; }

/* ─── FOOTER ────────────────────────────────────── */
footer {
  border-top: 1px solid #1a1a1a;
  padding: 32px 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  color: #aaa;
  font-size: 12px;
}
.footer-left { font-weight: 700; }
.footer-links { display: flex; gap: 20px; }
.footer-links a { color: #aaa; transition: color .2s; }
.footer-links a:hover { color: #fff; }

/* ─── RESPONSIVE ────────────────────────────────── */
@media (max-width: 768px) {
  .nav-links { display: none; }
  .hero { flex-direction: column; padding: 60px 24px 40px; gap: 40px; }
  .hero-headline { font-size: 40px; }
  .hero::before { display: none; }
  .phone-frame { width: 180px; height: 360px; }
  .container { padding: 0 24px; }
  .bento-grid { grid-template-columns: repeat(2, 1fr); }
  .bento-card.wide { grid-column: span 2; }
  .deep-dive, .deep-dive.reverse { flex-direction: column; gap: 40px; padding: 40px 0; }
  .deepdive-phone { width: 180px; height: 360px; align-self: center; }
  .ai-grid { grid-template-columns: 1fr; }
  .cta-headline { font-size: 36px; }
  footer { flex-direction: column; gap: 16px; text-align: center; }
  .footer-links { flex-wrap: wrap; justify-content: center; }
}
  </style>
</head>
<body>
  <!-- NAV — Task 3 -->
  <!-- HERO — Task 4 -->
  <!-- BENTO GRID — Task 5 -->
  <!-- FEATURE DEEP-DIVES — Task 6 -->
  <!-- AI SPOTLIGHT — Task 7 -->
  <!-- CTA + FOOTER — Task 8 -->
</body>
</html>
